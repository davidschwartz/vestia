[build]
  publish = "site/"

# Redirect www to root domain
[[redirects]]
  from = "https://www.vestia.co/*"
  to = "https://vestia.co/:splat"
  status = 301
  force = true

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
